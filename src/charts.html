<!DOCTYPE html>
<html lang="ru" class="h-full overflow-hidden">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0F0F0F" />

  <title>BTC & ETH Trading View (5m)</title>
  <meta name="description" content="Двойной график BTC/USDT и ETH/USDT в реальном времени с таймфреймом 5 минут." />

  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body class="h-full w-full m-0 p-0 bg-[#0F0F0F] text-paper overflow-hidden flex flex-col antialiased">

  <!-- Секция 1: BTC/USDT (50% высоты) -->
  <section class="h-1/2 w-full relative border-b border-white/10 overflow-hidden" aria-label="BTC/USDT Chart">
    <div class="tradingview-widget-container h-full w-full">
      <div class="tradingview-widget-container__widget h-full w-full"></div>
      <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
      {
        "autosize": true,
        "symbol": "BINANCE:BTCUSDT",
        "interval": "5",
        "timezone": "Etc/UTC",
        "theme": "dark",
        "style": "1",
        "locale": "en",
        "allow_symbol_change": true,
        "calendar": false,
        "details": false,
        "hide_side_toolbar": true,
        "hide_top_toolbar": false,
        "hide_legend": false,
        "hide_volume": false,
        "hotlist": false,
        "save_image": true,
        "backgroundColor": "#0F0F0F",
        "gridColor": "rgba(242, 242, 242, 0.06)",
        "watchlist": [],
        "withdateranges": false,
        "compareSymbols": [],
        "studies": []
      }
      </script>
    </div>
  </section>

  <!-- Секция 2: ETH/USDT (50% высоты) -->
  <section class="h-1/2 w-full relative overflow-hidden" aria-label="ETH/USDT Chart">
    <div class="tradingview-widget-container h-full w-full">
      <div class="tradingview-widget-container__widget h-full w-full"></div>
      <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
      {
        "autosize": true,
        "symbol": "BINANCE:ETHUSDT",
        "interval": "5",
        "timezone": "Etc/UTC",
        "theme": "dark",
        "style": "1",
        "locale": "en",
        "allow_symbol_change": true,
        "calendar": false,
        "details": false,
        "hide_side_toolbar": true,
        "hide_top_toolbar": false,
        "hide_legend": false,
        "hide_volume": false,
        "hotlist": false,
        "save_image": true,
        "backgroundColor": "#0F0F0F",
        "gridColor": "rgba(242, 242, 242, 0.06)",
        "watchlist": [],
        "withdateranges": false,
        "compareSymbols": [],
        "studies": []
      }
      </script>
    </div>
  </section>

  <script src="./main.js" defer></script>
</body>
</html>
