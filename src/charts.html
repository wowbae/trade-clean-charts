<!DOCTYPE html>
<html lang="ru" class="h-full overflow-hidden">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0F0F0F" />

  <title>BTC & ETH Trading View (5m)</title>
  <meta name="description" content="Двойной график BTC/USDT и ETH/USDT в реальном времени с таймфреймом 5 минут." />

  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body class="h-full w-full m-0 p-0 bg-[#0F0F0F] text-paper overflow-hidden flex flex-col antialiased">

  <!-- Секция 1: BTC/USDT (50% высоты) -->
  <section class="h-1/2 w-full relative border-b border-white/10 overflow-hidden" aria-label="BTC/USDT Chart">
    <div class="tradingview-widget-container h-full w-full">
      <div class="tradingview-widget-container__widget h-full w-full"></div>
      <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
      {
        "autosize": true,
        "symbol": "BINANCE:BTCUSDT",
        "interval": "5",
        "timezone": "Europe/Moscow",
        "theme": "dark",
        "style": "1",
        "locale": "en",
        "allow_symbol_change": true,
        "calendar": false,
        "details": false,
        "hide_side_toolbar": true,
        "hide_top_toolbar": false,
        "hide_legend": false,
        "hide_volume": false,
        "hotlist": false,
        "save_image": true,
        "backgroundColor": "#0F0F0F",
        "gridColor": "rgba(242, 242, 242, 0.06)",
        "watchlist": [],
        "studies": [],
      }
      </script>
    </div>
    <!-- Таймер обратного отсчёта BTC -->
    <div class="absolute top-3 right-3 z-20 flex items-center gap-1.5 px-2.5 py-1 rounded-md bg-black/60 backdrop-blur-sm border border-white/5 text-xs font-mono select-none" data-bar-timer="btc">
      <span class="w-1.5 h-1.5 rounded-full bg-accent animate-pulse"></span>
      <span class="text-white/80">~</span>
      <span class="text-white font-semibold tabular-nums" data-bar-countdown="btc">--</span>
    </div>
  </section>

  <!-- Секция 2: ETH/USDT (50% высоты) -->
  <section class="h-1/2 w-full relative overflow-hidden" aria-label="ETH/USDT Chart">
    <div class="tradingview-widget-container h-full w-full">
      <div class="tradingview-widget-container__widget h-full w-full"></div>
      <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
      {
        "autosize": true,
        "symbol": "BINANCE:ETHUSDT",
        "interval": "5",
        "timezone": "Europe/Moscow",
        "theme": "dark",
        "style": "1",
        "locale": "en",
        "allow_symbol_change": true,
        "calendar": false,
        "details": false,
        "hide_side_toolbar": true,
        "hide_top_toolbar": false,
        "hide_legend": false,
        "hide_volume": false,
        "hotlist": false,
        "save_image": true,
        "backgroundColor": "#0F0F0F",
        "gridColor": "rgba(242, 242, 242, 0.06)",
        "watchlist": [],
        "studies": [],
      }
      </script>
    </div>
    <!-- Таймер обратного отсчёта ETH -->
    <div class="absolute top-3 right-3 z-20 flex items-center gap-1.5 px-2.5 py-1 rounded-md bg-black/60 backdrop-blur-sm border border-white/5 text-xs font-mono select-none" data-bar-timer="eth">
      <span class="w-1.5 h-1.5 rounded-full bg-accent animate-pulse"></span>
      <span class="text-white/80">~</span>
      <span class="text-white font-semibold tabular-nums" data-bar-countdown="eth">--</span>
    </div>
  </section>

  <script>
    (function() {
      function pad(n) { return n < 10 ? '0' + n : n; }

      function updateCountdown() {
        var now = Date.now();
        var msIn5m = 300000;
        var elapsed = now % msIn5m;
        var remaining = Math.max(0, msIn5m - elapsed);
        var totalSec = Math.ceil(remaining / 1000);
        var min = Math.floor(totalSec / 60);
        var sec = totalSec % 60;
        var text = min + ':' + pad(sec);

        var el1 = document.querySelector('[data-bar-countdown="btc"]');
        var el2 = document.querySelector('[data-bar-countdown="eth"]');
        if (el1) el1.textContent = text;
        if (el2) el2.textContent = text;
      }

      updateCountdown();
      setInterval(updateCountdown, 1000);
    })();
  </script>
</body>
</html>
